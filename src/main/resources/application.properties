# Server Configuration
server.port=${PORT:8081}

# Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:portfoliohappy_db}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:shravani}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# AI API Configuration (Groq)
# Replace with your actual API Key and URL
ai.api.url=${AI_API_URL:https://api.groq.com/openai/v1/chat/completions}
ai.api.key=${AI_API_KEY:YOUR_GROQ_API_KEY_HERE}
ai.api.model=${AI_API_MODEL:llama-3.3-70b-versatile}

# File Upload Limits
server.tomcat.max-http-post-size=10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT Configuration
jwt.secret=${JWT_SECRET:your_secret_jwt_key_change_this_in_production_12345}
















