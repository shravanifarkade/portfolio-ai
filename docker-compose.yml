version: '3.8'

services:
  portfolio-backend:
    build: .
    container_name: portfolio-backend
    ports:
      - "${SERVER_PORT:-8081}:8081"
    environment:
      - SERVER_PORT=${SERVER_PORT:-8081}
      - DB_HOST=portfolio-db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-portfoliohappy_db}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-shravani}
      - AI_API_URL=${AI_API_URL}
      - AI_API_KEY=${AI_API_KEY}
      - AI_API_MODEL=${AI_API_MODEL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - portfolio-db
    networks:
      - portfolio-network

  portfolio-frontend:
    build: ./frontend
    container_name: portfolio-frontend
    ports:
      - "80:80"
    depends_on:
      - portfolio-backend
    networks:
      - portfolio-network

  portfolio-db:
    image: mysql:8.0
    container_name: portfolio-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-shravani}
      MYSQL_DATABASE: ${DB_NAME:-portfoliohappy_db}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - portfolio-network

volumes:
  mysql_data:


networks:
  portfolio-network:
    driver: bridge
